name: Message Board Proxy
on:
  workflow_dispatch:
  repository_dispatch:
    types: [message_action]

jobs:
  proxy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Run API Proxy
        env:
          GITHUB_TOKEN: ${{ secrets.MESSAGE_TOKEN }}
          TARGET_REPO: reiilive/rei-messages
        run: |
          node -e "
          const https = require('https');
          const query = new URLSearchParams(process.env.INPUT_DATA);
          const action = query.get('action');
          const data = JSON.parse(query.get('data') || '{}');
          
          const options = {
            hostname: 'api.github.com',
            port: 443,
            headers: {
              'Authorization': `token ${process.env.GITHUB_TOKEN}`,
              'Accept': 'application/vnd.github.v3+json',
              'User-Agent': 'Node.js'
            }
          };

          async function request(method, path, body) {
            return new Promise((resolve, reject) => {
              const req = https.request({...options, method, path}, (res) => {
                let result = '';
                res.on('data', (chunk) => result += chunk);
                res.on('end', () => resolve({status: res.statusCode, body: result}));
              });
              req.on('error', reject);
              if (body) req.write(JSON.stringify(body));
              req.end();
            });
          }

          async function main() {
            try {
              let response;
              const apiPath = `/repos/${process.env.TARGET_REPO}/issues`;
              
              if (action === 'getMessages') {
                response = await request('GET', `${apiPath}?state=all&labels=message-board`);
              } else if (action === 'addMessage') {
                response = await request('POST', apiPath, {
                  title: `[MB] ${data.name}`,
                  body: data.content,
                  labels: ['message-board']
                });
              } else if (action === 'addQuestion') {
                response = await request('POST', apiPath, {
                  title: `[Q] ${data.id}`,
                  body: data.content,
                  labels: ['cotton-candy']
                });
              } else if (action === 'getQuestion') {
                response = await request('GET', `${apiPath}?state=all&labels=cotton-candy&q=[Q] ${data.id}`);
                if (response.status === 200) {
                  const issues = JSON.parse(response.body);
                  if (issues.length > 0) {
                    const commentRes = await request('GET', `${apiPath}/${issues[0].number}/comments`);
                    response.body = JSON.stringify({
                      question: issues[0].body,
                      reply: commentRes.status === 200 ? JSON.parse(commentRes.body)[0]?.body || '' : ''
                    });
                  }
                }
              }
              
              console.log(JSON.stringify({
                status: response.status,
                body: response.body
              }));
            } catch (e) {
              console.log(JSON.stringify({status: 500, body: e.message}));
            }
          }
          
          main();
          "
