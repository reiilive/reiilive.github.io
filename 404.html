<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Redirecting...</title>
    <script>
        // 重定向所有404路径到index.html，并保留原路径
        const path = window.location.pathname;
        window.history.replaceState({}, '', '/');
        window.location.href = '/#!' + path;
    </script>
</head>
<body>
</body>
</html>
